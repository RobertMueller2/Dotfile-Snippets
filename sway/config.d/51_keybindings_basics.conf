### Key bindings
#
# Basics:
#

#? Start a terminal
bindsym $mod+Return exec exec $term

#? Start a blank window
bindsym $mod+Shift+Return exec exec blankwindow-gtk-rs

#? Kill focused window
bindsym $mod+Shift+q kill

#? Start your launcher
bindsym $mod+d exec exec $menu

# Drag floating windows by holding down $mod and left mouse button.
# Resize them with right mouse button + $mod.
# Despite the name, also works for non-floating windows.
# Change normal to inverse to use left mouse button for resizing and right
# mouse button for dragging.
floating_modifier $mod normal

#? Reload the configuration file
bindsym $mod+Shift+c reload

#? Exit sway (logs you out of your Wayland session)
bindsym $ctrl+$mod+$shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -b 'Yes, exit sway' 'swaymsg exit'
bindsym $mod+$shift+e exec exec wlogout

# Window stuff
# FIXME: move
#? sticky
bindsym $mod+$shift+t sticky toggle, mark --add _newstickychange

#? titlebar toggle, only when things go wrong
bindsym $mod+$shift+b border toggle

#? change floating setting for new windows
bindsym $mod+$ctrl+Space exec sh -c 'if [ X"$$windowmode" = "X$tiled_new_indicator" ]; then echo "$floating_new_indicator"; else echo "$tiled_new_indicator"; fi' | xargs -- swaymsg set \$windowmode

#? run command via wofi
bindsym $mod+r exec exec wofi --show run

#? drun command via wofi
bindsym $mod+shift+d exec exec wofi --show drun

#? run arbitrary command and place output in a floating terminal
bindsym $mod+$shift+r exec wayland-helper.sh get_cmd_output

#? fnott dismiss
bindsym $mod+$ctrl+n exec exec fnottctl dismiss
bindsym $mod+$ctrl+$shift+n exec exec fnottctl dismiss all

#? fnott actions
bindsym $mod+$alt+n exec exec fnottctl actions
bindsym $mod+$alt+$shift+n exec exec sway-helper.sh fnott_actions

#FIXME: add keybindings for copying image to clipboard with wl-copy
#? record screenshot if area
bindsym Print exec grim -g "$(slurp -d)" - | satty --filename - --output-filename ~/Bilder/_volatile/Screenshots/satty-$(date '+%Y%m%d-%H%M%S').png

#? record screenshot of focused screen
bindsym Shift+Control+Print exec grim -o $(swaymsg -t get_outputs | jq -r '.[] | select(.focused) | .name') - | satty --filename - --output-filename ~/Bilder/_volatile/Screenshots/satty-$(date '+%Y%m%d-%H%M%S').png

#? record screenshot of focused screen with delay
bindsym Alt+Shift+Control+Print exec sleep 2 && grim -o $(swaymsg -t get_outputs | jq -r '.[] | select(.focused) | .name') - | satty --filename - --output-filename ~/Bilder/_volatile/Screenshots/satty-$(date '+%Y%m%d-%H%M%S').png

#? record screenshot of active window
bindsym Shift+Print exec grim -g $(swaymsg -t get_tree | jq -r '.. | (.nodes? // empty)[] | select(.focused) | .rect | "\(.x),\(.y) \(.width)x\(.height)" ') - | satty --filename - --output-filename ~/Bilder/_volatile/Screenshots/satty-$(date '+%Y%m%d-%H%M%S').png

#? return color under pixel
bindsym $mod+$ctrl+period exec wayland-helper.sh get_pixel

#? display window information
bindsym $mod+question exec sway-helper.sh sprop

#? show window specific help (if available)
bindsym $mod+F1 exec sway-helper.sh get_apphelp

#? show window specific help (if available)
bindsym $mod+F2 exec sway-helper.sh edit_apphelp

#? show generic help topics
bindsym $mod+$ctrl+F1 exec wayland-helper.sh get_generichelp

#? show generic help topics
bindsym $mod+$ctrl+F2 exec wayland-helper.sh edit_generichelp

#? show sway keybindings
bindsym $mod+Shift+F1 exec sway-helper.sh sway_help

#? show sway window tree (get_tree)
bindsym $mod+$shift+g exec sway-helper.sh get_tree

#? show sway environment variables
bindsym $mod+$ctrl+e exec wayland-helper.sh get_env

#? run file manager
bindsym $mod+e exec exec $fm

#? bemoji, type result
bindsym $mod+period exec bemoji -t

#? bemoji, copy result
bindsym $mod+$alt+$shift+e exec bemoji -p

#? show a manpage
bindsym $mod+$ctrl+m exec wayland-helper.sh manpage

#? edit user or host MOTD 
bindsym $mod+m exec wayland-helper.sh motd_user
bindsym $mod+Shift+m exec wayland-helper.sh motd_host

#? edit/show quicknotes
bindsym $mod+q exec wayland-helper.sh quicknotes

#? show snippets
bindsym $mod+$alt+s exec snippets.sh

#? switch outputs
bindsym $mod+p exec sway-helper.sh switch_outputs
bindsym $mod+$ctrl+p exec exec wdisplays

#? show pager
bindsym $mod+$shift+p exec "echo 2 > /run/user/$(id -u)/sovpipe"

#? execute arbitrary swaymsg commands
bindsym $mod+c exec sway-helper.sh swaymsg_command

#? charmap
bindsym $mod+$ctrl+c exec exec gucharmap

#? toggle auto-transparency
bindsym $mod+$ctrl+t exec exec swayhelper tag_toggle _transp

#? opacity
bindsym $mod+$alt+o opacity plus 0.05
bindsym $mod+$alt+$ctrl+o opacity plus 0.2
bindsym $mod+$alt+$shift+o opacity 1
bindsym $mod+$alt+t opacity minus 0.05
bindsym $mod+$alt+$ctrl+t opacity minus 0.2
bindsym $mod+$alt+$shift+t opacity 0

#? display info bubbles for nodes on screen
bindsym $mod+u exec exec swaynodeinfo

#? open URL in selected browser
bindsym $mod+$ctrl+u exec launch-with-browser.sh

#? open journalctl
bindsym $mod+$ctrl+j exec wayland-helper.sh session_journal

#? show drawer
bindsym $mod+F3 exec exec nwg-drawer

#? adjust brightness
bindsym XF86MonBrightnessUp exec exec brightnessctl s +10
bindsym XF86MonBrightnessDown exec exec brightnessctl s 10-

#? audio
bindsym $mod+$ctrl+a exec wayland-helper.sh audio_set_default_sink
bindsym $mod+$ctrl+Shift+a exec wayland-helper.sh audio_set_app_sink

bindsym XF86AudioMute exec exec pactl set-sink-mute @DEFAULT_SINK@ toggle
bindsym XF86AudioRaiseVolume exec exec pactl set-sink-volume @DEFAULT_SINK@ +1%
bindsym XF86AudioLowerVolume exec exec pactl set-sink-volume @DEFAULT_SINK@ -1%

bindsym $ctrl+XF86AudioRaiseVolume exec exec pactl set-sink-volume @DEFAULT_SINK@ +10%
bindsym $ctrl+XF86AudioLowerVolume exec exec pactl set-sink-volume @DEFAULT_SINK@ -10%

bindsym $alt+XF86AudioRaiseVolume exec exec wayland-helper.sh audio_set_app_volume +1%
bindsym $alt+XF86AudioLowerVolume exec exec wayland-helper.sh audio_set_app_volume -1%

bindsym $ctrl+$alt+XF86AudioRaiseVolume exec exec wayland-helper.sh audio_set_app_volume +10%
bindsym $ctrl+$alt+XF86AudioLowerVolume exec exec wayland-helper.sh audio_set_app_volume -10%

# keycode doesn't work well. The key is <I256> -> 248 but also aliased XF86AudioMicMute
bindsym XF86AudioMicMute exec exec pactl set-source-mute @DEFAULT_SOURCE@ toggle
#bindcode 256 exec exec pactl set-source-mute @DEFAULT_SOURCE@ toggle

#? audio - playback related
bindsym XF86AudioPrev exec exec playerctl previous
bindsym XF86AudioNext exec exec playerctl next
bindsym XF86AudioPlay exec exec playerctl play-pause
bindsym XF86AudioStop exec exec playerctl stop

# use <I248> -> 240 for screen lock
# see swayidle(1)
#FIXME not ideal with pkill
#? signal swayidle to lock immediately
bindcode 248 exec pkill -SIGUSR1 swayidle
