# Workspaces:
# these were rebound with ctrl to use swaysome for normal operation

#? Switch to workspace
bindsym $ctrl+$mod+1 workspace number 1
bindsym $ctrl+$mod+2 workspace number 2
bindsym $ctrl+$mod+3 workspace number 3
bindsym $ctrl+$mod+4 workspace number 4
bindsym $ctrl+$mod+5 workspace number 5
bindsym $ctrl+$mod+6 workspace number 6
bindsym $ctrl+$mod+7 workspace number 7
bindsym $ctrl+$mod+8 workspace number 8
bindsym $ctrl+$mod+9 workspace number 9
bindsym $ctrl+$mod+0 workspace number 10

#? Move focused container to workspace
bindsym $ctrl+$mod+Shift+1 move container to workspace number 1
bindsym $ctrl+$mod+Shift+2 move container to workspace number 2
bindsym $ctrl+$mod+Shift+3 move container to workspace number 3
bindsym $ctrl+$mod+Shift+4 move container to workspace number 4
bindsym $ctrl+$mod+Shift+5 move container to workspace number 5
bindsym $ctrl+$mod+Shift+6 move container to workspace number 6
bindsym $ctrl+$mod+Shift+7 move container to workspace number 7
bindsym $ctrl+$mod+Shift+8 move container to workspace number 8
bindsym $ctrl+$mod+Shift+9 move container to workspace number 9
bindsym $ctrl+$mod+Shift+0 move container to workspace number 10
# Note: workspaces can have any name you want, not just numbers.
# We just use 1-10 as the default.

#? Change focus between workspaces
bindsym $mod+1 exec "swaysome focus 1"
bindsym $mod+2 exec "swaysome focus 2"
bindsym $mod+3 exec "swaysome focus 3"
bindsym $mod+4 exec "swaysome focus 4"
bindsym $mod+5 exec "swaysome focus 5"
bindsym $mod+6 exec "swaysome focus 6"
bindsym $mod+7 exec "swaysome focus 7"
bindsym $mod+8 exec "swaysome focus 8"
bindsym $mod+9 exec "swaysome focus 9"
bindsym $mod+0 exec "swaysome focus 0"

#? Move containers between workspaces
bindsym $mod+Shift+1 exec "swaysome move 1"
bindsym $mod+Shift+2 exec "swaysome move 2"
bindsym $mod+Shift+3 exec "swaysome move 3"
bindsym $mod+Shift+4 exec "swaysome move 4"
bindsym $mod+Shift+5 exec "swaysome move 5"
bindsym $mod+Shift+6 exec "swaysome move 6"
bindsym $mod+Shift+7 exec "swaysome move 7"
bindsym $mod+Shift+8 exec "swaysome move 8"
bindsym $mod+Shift+9 exec "swaysome move 9"
bindsym $mod+Shift+0 exec "swaysome move 0"

#? Move focused container to next output
bindsym $mod+o exec "swaysome next_output"

#? Move focused container to previous output
bindsym $mod+Shift+o exec "swaysome prev_output"

#? move workspace
bindsym $ctrl+$mod+h move workspace to output right
bindsym $ctrl+$mod+l move workspace to output left

# Init workspaces for every screen
exec "swaysome init 1"
